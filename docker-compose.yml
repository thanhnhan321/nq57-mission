services:
  postgres:
    image: postgres:16-alpine
    container_name: nq57-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: db_nq57
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d db_nq57"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: nq57-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio_init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    container_name: nq57-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb local/nghiquyet57 --ignore-existing &&
      mc anonymous set public local/nghiquyet57
      "
    restart: "no"

volumes:
  postgres_data:
  minio_data:
