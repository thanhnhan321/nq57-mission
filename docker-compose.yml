services:
  nghiquyet57_web:
    image: 10.39.125.26:8000/nq57_catp_beta:latest
    container_name: nghiquyet57_web
    volumes:
      - ./logs:/dist/logs
      - ./staticfiles:/dist/staticfiles
    env_file:
      - .env
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/ || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 5

  minio:
    image: 10.39.125.26:8000/minio:latest
    container_name: nghiquyet57-storage
    restart: always
    volumes:
      - ./storage:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
      - MINIO_UPDATE=off
    entrypoint: >
      /bin/sh -c '
        isAlive() { curl -sf http://127.0.0.1:9000/minio/health/live; }    # check if Minio is alive
        minio $0 "$@" --quiet & echo $! > /tmp/minio.pid                   # start Minio in the background
        while ! isAlive; do sleep 0.1; done                                # wait until Minio is alive
        mc alias set minio http://127.0.0.1:9000 minioadmin minioadmin # setup Minio client
        mc mb minio/nghiquyet57 || true                                    # create a test bucket
        mc anonymous set public minio/nghiquyet57                          # make the test bucket public
        kill -s INT $(cat /tmp/minio.pid) && rm /tmp/minio.pid             # stop Minio
        while isAlive; do sleep 0.1; done                                  # wait until Minio is stopped
        exec minio $0 "$@"                                                 # start Minio in the foreground
      '
    command: server /data --console-address ":9001"
    ports:
      - "9000:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 5