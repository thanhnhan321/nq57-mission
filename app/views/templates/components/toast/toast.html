{% from 'templates/components/button/button.html' import button %}
{% macro toast(source) %}
{% set messages = [] %}
{% for message in source %}
{% set _ = messages.append({'message': message.message,'level': message.level, 'id': uuid() }) %}
{% endfor %}
<div id="toast-manager" class="fixed top-16 right-0" style="z-index: 9999;">
    <div id="toast-container"
     class="flex flex-col gap-2"
     x-data="{
        messages: {{ jsonify(messages) }},
        classMap: {
            25: 'bg-green-500 text-white',
            20: 'bg-blue-500 text-white',
            30: 'bg-yellow-500 text-white',
            40: 'bg-red-500 text-white',
        },
        removeToast(id) {
          this.messages = (this.messages || []).filter(m => m.id !== id);
        }
     }"
     x-init="
        $nextTick(() => {
                htmx.on('new-message', (e) => {
                    const incoming = e?.detail?.value || [];
                    $data.messages = [...($data?.messages || []), ...(incoming || [])];
            });
        });
        "
     >
        <template x-for="message in messages" :key="message.id">
            <div
                class="flex items-center w-full max-w-xs p-2 mb-4 rounded-lg shadow-lg transform transition-all duration-300 ease-in-out"
                :class="classMap[message.level] || 'bg-white text-gray-500'"
                x-data="{
                    show: false,
                    duration: 3000,
                    timer: null,
                    selfDestroy(){
                        setTimeout(() => {
                            removeToast(message.id);
                        }, 300);
                    }
                }" 
                x-init="
                    setTimeout(() => { show = true }, 100);
                    if (duration > 0 && message.level <= 35) {
                        timer = setTimeout(() => { 
                            show = false;
                            selfDestroy();
                        }, duration);
                    }"
                x-show="show"
                x-transition:enter="transition ease-out duration-300"
                x-transition:enter-start="opacity-0 translate-x-full"
                x-transition:enter-end="opacity-100 translate-x-0"
                x-transition:leave="transition ease-in duration-300"
                x-transition:leave-start="opacity-100 translate-x-0"
                x-transition:leave-end="opacity-0 translate-x-full"
                style="display: none;">


                <!-- Message -->
                <div class="mx-3 text-sm font-normal flex-1" x-text="message.message"></div>

                <!-- Close Button -->
                {{
                    button(
                    icon='close.svg',
                    variant='transparent',
                    class='text-current',
                    extra_attributes={
                        '@click': "if (timer) clearTimeout(timer); show = false; selfDestroy();"
                    })
                }}
            </div>
        </template>
    </div>
</div>
{% endmacro %}
