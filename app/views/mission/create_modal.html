<form
    hx-post="{% url 'mission_create' %}"
    hx-trigger="submit"
    hx-target="this"
    hx-swap="none"
>
    {{ csrf_input|safe }}

    <!-- input ví dụ -->
    <input type="text" name="name" placeholder="Tên nhiệm vụ" class="border p-2 w-full" required />

    <button type="submit" class="mt-3 px-4 py-2 bg-blue-600 text-white rounded">
        Lưu
    </button>
</form>
